---
# Monitoring server specific variables

# MySQL tuning parameters for 4GB RAM monitoring server
mysql_port: 3306
mysql_buffer_pool_size: "1G"
mysql_buffer_pool_instances: 1
mysql_log_file_size: "256M"
mysql_log_buffer_size: "16M"
mysql_max_connections: 150

# Keepalived HA Virtual IP configuration
keepalived_vip: "10.0.100.100"
keepalived_interface: "eth0"
keepalived_router_id: 51

# Primary vs Standby keepalived weights
keepalived_priority_primary: 101
keepalived_priority_standby: 100
