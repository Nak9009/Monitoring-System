# ============================================================================
# Enterprise Monitoring Stack — Docker Compose
# Zabbix 7.0 LTS + Grafana 11 + MySQL 8.0 + Loki + Uptime Kuma
# ============================================================================
#
# Usage:
#   cp .env.example .env    # Configure your environment
#   docker compose up -d    # Start all services
#   docker compose logs -f  # View logs
#
# Access:
#   Zabbix:     https://localhost:8443  (Admin/zabbix)
#   Grafana:    http://localhost:3000   (admin/admin)
#   Uptime Kuma: http://localhost:3001
# ============================================================================

networks:
  monitoring-frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  monitoring-backend:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.1.0/24

volumes:
  mysql-data:
    driver: local
  zabbix-server-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
  uptime-kuma-data:
    driver: local

# ============================================================================
# SERVICES
# ============================================================================
services:

  # --------------------------------------------------------------------------
  # MySQL 8.0 Database
  # --------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: mon-mysql
    hostname: mysql
    restart: unless-stopped
    stop_grace_period: 1m
    environment:
      MYSQL_DATABASE: ${DB_NAME:-zabbix}
      MYSQL_USER: ${DB_USER:-zabbix}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./configs/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      monitoring-backend:
        ipv4_address: 172.20.1.10
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  # --------------------------------------------------------------------------
  # Zabbix Server 7.0 LTS
  # --------------------------------------------------------------------------
  zabbix-server:
    image: ${ZABBIX_SERVER_IMAGE:-zabbix/zabbix-server-mysql:ubuntu-7.0-latest}
    container_name: mon-zabbix-server
    hostname: zabbix-server
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_SERVER_HOST: mysql
      DB_SERVER_PORT: 3306
      MYSQL_USER: ${DB_USER:-zabbix}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_DATABASE: ${DB_NAME:-zabbix}
      ZBX_CACHESIZE: ${ZBX_CACHESIZE:-512M}
      ZBX_HISTORYCACHESIZE: ${ZBX_HISTORYCACHESIZE:-256M}
      ZBX_HISTORYINDEXCACHESIZE: ${ZBX_HISTORYINDEXCACHESIZE:-64M}
      ZBX_TRENDCACHESIZE: ${ZBX_TRENDCACHESIZE:-64M}
      ZBX_TRENDFUNCTIONCACHESIZE: ${ZBX_TRENDFUNCTIONCACHESIZE:-64M}
      ZBX_VALUECACHESIZE: ${ZBX_VALUECACHESIZE:-256M}
      ZBX_STARTPOLLERS: ${ZBX_STARTPOLLERS:-10}
      ZBX_STARTPOLLERSUNREACHABLE: ${ZBX_STARTPOLLERSUNREACHABLE:-5}
      ZBX_STARTTRAPPERS: ${ZBX_STARTTRAPPERS:-5}
      ZBX_STARTPINGERS: ${ZBX_STARTPINGERS:-5}
      ZBX_STARTDISCOVERERS: ${ZBX_STARTDISCOVERERS:-3}
      ZBX_STARTHTTPPOLLERS: ${ZBX_STARTHTTPPOLLERS:-3}
      ZBX_STARTTIMERS: ${ZBX_STARTTIMERS:-2}
      ZBX_STARTESCALATORS: ${ZBX_STARTESCALATORS:-2}
      ZBX_STARTPREPROCESSORS: ${ZBX_STARTPREPROCESSORS:-6}
      ZBX_STARTHISTORYPOLLERS: ${ZBX_STARTHISTORYPOLLERS:-5}
      ZBX_TIMEOUT: 10
      ZBX_LOGSLOWQUERIES: 3000
      # SNMP Trap support
      ZBX_ENABLE_SNMP_TRAPS: "true"
    volumes:
      - zabbix-server-data:/var/lib/zabbix
      - ./configs/zabbix/zabbix_server_extra.conf:/etc/zabbix/zabbix_server_extra.conf:ro
    networks:
      monitoring-backend:
        ipv4_address: 172.20.1.11
      monitoring-frontend:
        ipv4_address: 172.20.0.11
    ports:
      - "${ZABBIX_SERVER_PORT:-10051}:10051"
    healthcheck:
      test: ["CMD", "zabbix_server", "-R", "diaginfo"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 512M

  # --------------------------------------------------------------------------
  # Zabbix Web Frontend (Nginx)
  # --------------------------------------------------------------------------
  zabbix-frontend:
    image: ${ZABBIX_WEB_IMAGE:-zabbix/zabbix-web-nginx-mysql:ubuntu-7.0-latest}
    container_name: mon-zabbix-frontend
    hostname: zabbix-frontend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      zabbix-server:
        condition: service_started
    environment:
      DB_SERVER_HOST: mysql
      DB_SERVER_PORT: 3306
      MYSQL_USER: ${DB_USER:-zabbix}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_DATABASE: ${DB_NAME:-zabbix}
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: 10051
      PHP_TZ: ${TIMEZONE:-Asia/Bangkok}
      # PHP tuning
      ZBX_MAXEXECUTIONTIME: 600
      ZBX_MEMORYLIMIT: 256M
      ZBX_POSTMAXSIZE: 32M
      ZBX_UPLOADMAXFILESIZE: 16M
    volumes:
      - ./configs/nginx/zabbix-ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - ./certs:/etc/ssl/certs/monitoring:ro
    networks:
      monitoring-backend:
        ipv4_address: 172.20.1.12
      monitoring-frontend:
        ipv4_address: 172.20.0.12
    ports:
      - "${ZABBIX_HTTP_PORT:-8080}:8080"
      - "${ZABBIX_HTTPS_PORT:-8443}:8443"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api_jsonrpc.php -d '{\"jsonrpc\":\"2.0\",\"method\":\"apiinfo.version\",\"id\":1,\"auth\":null,\"params\":{}}' -H 'Content-Type: application/json-rpc' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # --------------------------------------------------------------------------
  # Zabbix Agent 2 (Self-Monitoring of the Docker host)
  # --------------------------------------------------------------------------
  zabbix-agent:
    image: zabbix/zabbix-agent2:ubuntu-7.0-latest
    container_name: mon-zabbix-agent
    hostname: mon-docker-host
    restart: unless-stopped
    depends_on:
      zabbix-server:
        condition: service_started
    environment:
      ZBX_HOSTNAME: "mon-docker-host"
      ZBX_SERVER_HOST: "zabbix-server"
      ZBX_PASSIVESERVERS: "172.20.0.0/16"
      ZBX_SERVER_PORT: 10051
      ZBX_ACTIVE_ALLOW: "true"
      ZBX_PASSIVE_ALLOW: "true"
    privileged: true
    pid: host
    volumes:
      - /:/hostfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    networks:
      monitoring-backend:
        ipv4_address: 172.20.1.13
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # --------------------------------------------------------------------------
  # Zabbix SNMP Trap Receiver
  # --------------------------------------------------------------------------
  zabbix-snmptraps:
    image: zabbix/zabbix-snmptraps:ubuntu-7.0-latest
    container_name: mon-zabbix-snmptraps
    hostname: zabbix-snmptraps
    restart: unless-stopped
    volumes:
      - zabbix-server-data:/var/lib/zabbix
    networks:
      monitoring-frontend:
        ipv4_address: 172.20.0.14
    ports:
      - "162:1162/udp"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # --------------------------------------------------------------------------
  # Grafana 11 OSS
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:11.6.0
    container_name: mon-grafana
    hostname: grafana
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?Set GF_SECURITY_ADMIN_PASSWORD in .env}
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL:-http://localhost:3000}
      GF_SERVER_DOMAIN: ${GF_DOMAIN:-localhost}
      GF_INSTALL_PLUGINS: alexanderzobnin-zabbix-app
      # SMTP for alerting
      GF_SMTP_ENABLED: ${GF_SMTP_ENABLED:-false}
      GF_SMTP_HOST: ${GF_SMTP_HOST:-smtp.internal:587}
      GF_SMTP_USER: ${GF_SMTP_USER:-}
      GF_SMTP_PASSWORD: ${GF_SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${GF_SMTP_FROM:-monitoring@company.internal}
      # Disable anonymous access
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_BASIC_ENABLED: "true"
      # Database (use SQLite for Grafana state storage)
      GF_DATABASE_TYPE: sqlite3
      # Logging
      GF_LOG_MODE: console
      GF_LOG_LEVEL: info
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      monitoring-backend:
        ipv4_address: 172.20.1.20
      monitoring-frontend:
        ipv4_address: 172.20.0.20
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # --------------------------------------------------------------------------
  # Loki — Log Aggregation
  # --------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.5.0
    container_name: mon-loki
    hostname: loki
    restart: unless-stopped
    volumes:
      - loki-data:/loki
      - ./configs/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    networks:
      monitoring-backend:
        ipv4_address: 172.20.1.30
      monitoring-frontend:
        ipv4_address: 172.20.0.30
    ports:
      - "${LOKI_PORT:-3100}:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # --------------------------------------------------------------------------
  # Promtail — Log Shipper to Loki
  # --------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.5.0
    container_name: mon-promtail
    hostname: promtail
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./configs/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      monitoring-backend:
        ipv4_address: 172.20.1.31
    command: -config.file=/etc/promtail/config.yml
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # --------------------------------------------------------------------------
  # Uptime Kuma — Synthetic Monitoring & Status Page
  # --------------------------------------------------------------------------
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: mon-uptime-kuma
    hostname: uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      monitoring-frontend:
        ipv4_address: 172.20.0.40
    ports:
      - "${UPTIME_KUMA_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "extra/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # --------------------------------------------------------------------------
  # Test Ubuntu VM (Simulated via Docker Container)
  # --------------------------------------------------------------------------
  test-ubuntu-vm:
    image: zabbix/zabbix-agent2:ubuntu-7.0-latest
    container_name: test-ubuntu-vm
    hostname: test-ubuntu-vm
    restart: unless-stopped
    depends_on:
      zabbix-server:
        condition: service_started
    environment:
      ZBX_HOSTNAME: "test-ubuntu-vm"
      ZBX_SERVER_HOST: "zabbix-server"
      ZBX_PASSIVESERVERS: "172.20.0.0/16"
      ZBX_SERVER_PORT: 10051
      ZBX_ACTIVE_ALLOW: "true"
      ZBX_PASSIVE_ALLOW: "true"
      ZBX_TLSCONNECT: "psk"
      ZBX_TLSACCEPT: "psk"
      ZBX_TLSPSKIDENTITY: "monitoring-stack-psk"
      ZBX_TLSPSKFILE: "/var/lib/zabbix/enc/secret.psk"
    volumes:
      - ./certs/test-ubuntu-vm.psk:/var/lib/zabbix/enc/secret.psk:ro
    networks:
      monitoring-backend:
        ipv4_address: 172.20.1.50
      monitoring-frontend:
        ipv4_address: 172.20.0.50
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

