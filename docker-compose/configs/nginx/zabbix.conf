# =============================================================================
# Nginx Reverse Proxy — Zabbix Web Frontend
# =============================================================================
# This configuration provides:
#   - HTTPS termination with modern TLS settings
#   - HTTP → HTTPS redirect
#   - Security headers (HSTS, CSP, X-Frame-Options, etc.)
#   - Rate limiting to prevent brute-force login attacks
#   - Gzip compression for faster page loads
#   - WebSocket support for Zabbix real-time updates
# =============================================================================

# ---------------------------------------------------------------------------
# Rate Limiting Zones
# ---------------------------------------------------------------------------
# Limit login attempts: 5 requests/second per IP with burst of 10
limit_req_zone $binary_remote_addr zone=zabbix_login:10m rate=5r/s;

# General API rate limit: 30 requests/second per IP
limit_req_zone $binary_remote_addr zone=zabbix_api:10m rate=30r/s;

# Global connection limit per IP
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ---------------------------------------------------------------------------
# Upstream — Zabbix Web Frontend Container
# ---------------------------------------------------------------------------
upstream zabbix_web {
    server zabbix-web:8080;

    # Keep connections alive to reduce TCP overhead
    keepalive 32;
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS Redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME challenge support for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS Server
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # ----- TLS Configuration -----
    # Mount certificates via Docker volume or bind mount
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # Modern TLS only (TLS 1.2+ with strong ciphers)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    # SSL session caching for performance
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (requires valid CA-signed cert)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/nginx/ssl/ca-chain.crt;

    # ----- Security Headers -----
    # HSTS: force HTTPS for 1 year (enable includeSubDomains after testing)
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Prevent clickjacking — Zabbix should only be framed by itself
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # XSS protection (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy — don't leak internal URLs
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy — restrictive but compatible with Zabbix UI
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

    # Permissions Policy — disable unnecessary browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ----- Connection Limits -----
    limit_conn addr 50;

    # ----- Gzip Compression -----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ----- Client Settings -----
    client_max_body_size 32M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # ----- Proxy Defaults -----
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 16 8k;

    # ----- Zabbix Login — Rate Limited -----
    location ~ ^/index\.php$ {
        limit_req zone=zabbix_login burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://zabbix_web;
    }

    # ----- Zabbix API — Rate Limited -----
    location /api_jsonrpc.php {
        limit_req zone=zabbix_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://zabbix_web;
    }

    # ----- Static Assets — Cache Aggressively -----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://zabbix_web;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ----- Default Location -----
    location / {
        proxy_pass http://zabbix_web;

        # WebSocket support for Zabbix real-time widgets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ----- Health Check Endpoint (for load balancers) -----
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ----- Block Common Attack Vectors -----
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
